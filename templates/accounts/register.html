{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow p-4 login-card">

                <h2 class="text-center mb-4">
                    Register
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <input type="text"
                           name="username"
                           class="form-control mb-3"
                           placeholder="Username">

                    <input type="email"
                           name="email"
                           class="form-control mb-3"
                           placeholder="Email">

                    <input type="password"
                           name="password"
                           class="form-control mb-3"
                           placeholder="Password">

                    <button class="btn register-btn w-100">

                        Create Account

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
