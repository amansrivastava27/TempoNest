{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow p-4">

                <h2 class="mb-4">
                    Add Property
                </h2>

                <form method="POST"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn register-btn">

                        Upload Property

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
