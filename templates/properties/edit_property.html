{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="add-property-card shadow-lg">

                <div class="text-center mb-5">

                    <h1 class="fw-bold">
                        Edit Property
                    </h1>

                    <p class="text-muted">
                        Update your property details
                    </p>

                </div>

                <form method="POST"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit"
                            class="btn register-btn w-100 add-btn">

                        <i class="fa-solid fa-pen"></i>

                        Update Property

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
